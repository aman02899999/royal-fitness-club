name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - claude/royal-fitness-saas-refactor-87s2ul

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project royal-fitness-club-7adc1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Functions
        run: firebase deploy --only functions --project royal-fitness-club-7adc1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore Rules & Indexes
        run: firebase deploy --only firestore --project royal-fitness-club-7adc1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
