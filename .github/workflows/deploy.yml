name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - claude/royal-fitness-saas-refactor-87s2ul

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Firebase token (list projects)
        run: firebase projects:list
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase (debug)
        run: firebase deploy --only hosting,firestore,functions --project royal-fitness-club-7adc1 --debug 2>&1 | tee /tmp/firebase-debug.log; exit ${PIPESTATUS[0]}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
