name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - claude/royal-fitness-saas-refactor-87s2ul

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Authenticate: uses FIREBASE_SERVICE_ACCOUNT (preferred) or falls back to FIREBASE_TOKEN
      - name: Set up Firebase credentials
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa-key.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
            echo "Using service account authentication"
          else
            echo "Using FIREBASE_TOKEN (legacy)"
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting + Firestore rules
        run: firebase deploy --only hosting,firestore --project royal-fitness-club-7adc1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # Functions require the Blaze plan — don't block hosting deploy if this fails
      - name: Deploy Functions (requires Blaze plan)
        continue-on-error: true
        run: firebase deploy --only functions --project royal-fitness-club-7adc1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
