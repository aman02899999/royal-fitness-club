name: Release Signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 2.0.1)'
        required: true
        default: '2.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    name: Build & Sign Release APK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets for Capacitor
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp -r icons www/icons

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json injected"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set — skipping native Firebase config"
          fi

      # To sign the APK, add these secrets to GitHub:
      # KEYSTORE_BASE64  — base64-encoded .jks keystore file
      # KEY_ALIAS        — key alias in the keystore
      # KEY_PASSWORD     — key password
      # STORE_PASSWORD   — store password
      - name: Decode keystore (if signing secrets exist)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/rfc-release-key.jks

      - name: Build Release APK (unsigned if no keystore)
        run: |
          cd android
          if [ -f "app/rfc-release-key.jks" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=app/rfc-release-key.jks \
              -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
            echo "⚠️ Built unsigned release APK (no keystore secrets set)"
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: royal-fitness-club-v${{ github.event.inputs.version || github.ref_name }}-release
          path: android/app/build/outputs/apk/release/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          name: Royal Fitness Club ${{ github.ref_name }}
          body: |
            ## Royal Fitness Club Android App ${{ github.ref_name }}

            ### What's included
            - Full SaaS fitness platform
            - AI-generated meal plans & workout programmes
            - Tiger Score leaderboard
            - Challenges & courses
            - Admin panel (for gym owners)
            - Offline support via service worker

            ### Install
            Download the APK and install on your Android device.
            (Enable "Install from unknown sources" in Settings if sideloading)
