name: Build Android APK

on:
  push:
    branches: [ main, master, claude/royal-fitness-saas-refactor-87s2ul ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Debug APK
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets for Capacitor
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp -r icons www/icons

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json injected"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set — skipping native Firebase config"
          fi

      - name: Build APK (signed release if keystore secrets set, else debug)
        env:
          RFC_VERSION_CODE: ${{ github.run_number }}
          RFC_VERSION_NAME: '1.0.${{ github.run_number }}'
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "🔐 Keystore secrets found — building SIGNED RELEASE APK (stable signature; Google sign-in fingerprint stays valid)"
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > app/rfc-release-key.jks
            ./gradlew assembleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file="$PWD/app/rfc-release-key.jks" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            mkdir -p app/build/outputs/final
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/final/royal-fitness-club.apk
          else
            echo "⚠️ No KEYSTORE_BASE64 secret — building debug APK (signature changes each build; native Google sign-in will NOT work without the registered release fingerprint)"
            ./gradlew assembleDebug --no-daemon --stacktrace
            mkdir -p app/build/outputs/final
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/final/royal-fitness-club.apk
          fi

      - name: Get APK info
        id: apk_info
        run: |
          APK="android/app/build/outputs/final/royal-fitness-club.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK ready: $SIZE"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: royal-fitness-club-apk
          path: android/app/build/outputs/final/royal-fitness-club.apk
          retention-days: 30

      - name: Delete existing android-latest release (if exists)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin :refs/tags/android-latest 2>/dev/null || true

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Royal Fitness Club — Android App (Latest)"
          prerelease: true
          generate_release_notes: false
          body: |
            ## 📱 Royal Fitness Club — Android App

            **Download and install the latest Royal Fitness Club APK on your Android device.**

            ### How to Install
            1. Download `royal-fitness-club.apk` below
            2. On your Android phone: go to **Settings → Security → Unknown Sources** (or **Install Unknown Apps**) and allow your browser
            3. Open the downloaded file and tap **Install**
            4. Launch **Royal Fitness Club** from your home screen

            ### Requirements
            - Android 7.0 (API 24) or higher
            - ~20MB free space

            ### Features
            - ✅ Full fitness SaaS platform — meal plans, workout programmes, Beast Score
            - ✅ Tiger Score leaderboard & challenges
            - ✅ AI-powered blood report analysis
            - ✅ Knowledge Store with 100+ PDF guides
            - ✅ Admin panel for gym owners
            - ✅ Works offline (cached content)
            - ✅ Push notifications ready

            > **Note:** This is a debug build. A signed release build requires a keystore (see `release-android.yml`).

            **Build:** ${{ github.sha }} · **Size:** ${{ steps.apk_info.outputs.size }}
          files: android/app/build/outputs/final/royal-fitness-club.apk
