name: Build Android APK

on:
  push:
    branches: [ main, master, claude/royal-fitness-saas-refactor-87s2ul ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Debug APK
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets for Capacitor
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp -r icons www/icons

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ google-services.json injected"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret not set — skipping native Firebase config"
          fi

      - name: Build APK (signed release if keystore secrets set, else debug)
        env:
          RFC_VERSION_CODE: ${{ github.run_number }}
          RFC_VERSION_NAME: '1.0.${{ github.run_number }}'
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "🔐 Keystore secrets found — building SIGNED RELEASE APK (stable signature; Google sign-in fingerprint stays valid)"
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > app/rfc-release-key.jks
            ./gradlew assembleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file="$PWD/app/rfc-release-key.jks" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            mkdir -p app/build/outputs/final
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/final/royal-fitness-club.apk
          else
            echo "⚠️ No KEYSTORE_BASE64 secret — building debug APK (signature changes each build; native Google sign-in will NOT work without the registered release fingerprint)"
            ./gradlew assembleDebug --no-daemon --stacktrace
            mkdir -p app/build/outputs/final
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/final/royal-fitness-club.apk
          fi

      - name: Get APK info
        id: apk_info
        run: |
          APK="android/app/build/outputs/final/royal-fitness-club.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK ready: $SIZE"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: royal-fitness-club-apk
          path: android/app/build/outputs/final/royal-fitness-club.apk
          retention-days: 30

      # Create-or-update the android-latest release ATOMICALLY with gh.
      # (The old delete-then-recreate pattern raced GitHub's async tag
      # deletion and could leave the new release as an invisible DRAFT with
      # an "untagged-" URL — which is exactly a "release not found" for
      # downloads. Upload --clobber keeps the URL stable with no gap.)
      - name: Publish APK to android-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/final/royal-fitness-club.apk ./royal-fitness-club.apk
          SIZE=$(du -sh royal-fitness-club.apk | cut -f1)
          NOTES="## 📱 Royal Fitness Club — Android App

          Download \`royal-fitness-club.apk\` below, open it on your Android phone, allow install from unknown sources if prompted, and install.

          **Requirements:** Android 7.0+ · ~25MB
          **Build:** ${{ github.sha }} · **Size:** $SIZE"
          if gh release view android-latest --repo ${{ github.repository }} > /dev/null 2>&1; then
            # A leftover DRAFT (from the old delete/recreate race) is still
            # resolvable by tag name — publish it first so the tag exists and
            # the release is publicly downloadable.
            gh release edit android-latest --draft=false --prerelease --repo ${{ github.repository }} || true
            gh release upload android-latest royal-fitness-club.apk --clobber --repo ${{ github.repository }}
            gh release edit android-latest --notes "$NOTES" --repo ${{ github.repository }}
            echo "✅ Existing release updated"
          else
            gh release create android-latest royal-fitness-club.apk \
              --title "Royal Fitness Club — Android App (Latest)" \
              --notes "$NOTES" --prerelease --target ${{ github.sha }} \
              --repo ${{ github.repository }}
            echo "✅ Release created"
          fi
          gh release view android-latest --repo ${{ github.repository }} --json isDraft,assets -q '.isDraft' | grep -q false || { echo "::error::Release is a draft!"; exit 1; }

      # Also publish the APK on our own hosting (/royal-fitness-club.apk) so
      # downloads work even with a private repo. Deploys the full site from
      # this checkout (main) plus the fresh APK.
      - name: Publish APK to Firebase Hosting
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT secret missing — APK not published to hosting"
            exit 0
          fi
          cp android/app/build/outputs/final/royal-fitness-club.apk ./royal-fitness-club.apk
          npm install -g firebase-tools > /dev/null 2>&1
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa-key.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa-key.json"
          firebase deploy --only hosting --project royal-fitness-club-7adc1
