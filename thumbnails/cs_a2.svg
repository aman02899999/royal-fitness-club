<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  width="900" height="340" viewBox="0 0 900 340"
  role="img" aria-label="SPORTS NUTRITION & DIETETICS — USA Fitness Academy Diploma Program">
  <title>SPORTS NUTRITION & DIETETICS | USA Fitness Academy Diploma Program</title>
  <desc>sports nutrition, dietetics, athlete diet, performance nutrition diploma. 12 modules, 10 Weeks, rated 4.8/5 stars. USA Fitness Academy accredited certification.</desc>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg_cs_a2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="55%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#021a0d"/>
    </linearGradient>
    <linearGradient id="shine_cs_a2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow_cs_a2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="900" height="340" fill="url(#bg_cs_a2)"/>
