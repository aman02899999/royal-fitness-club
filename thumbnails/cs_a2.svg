  <text x="22" y="120" font-family="Arial Black, Impact, Arial" font-weight="900" font-size="42" fill="#ffffff" letter-spacing="1.5" paint-order="stroke" stroke="rgba(0,0,0,0.5)" stroke-width="4">SPORTS NUTRITION &</text><text x="22" y="168" font-family="Arial Black, Impact, Arial" font-weight="900" font-size="42" fill="#ffffff" letter-spacing="1.5" paint-order="stroke" stroke="rgba(0,0,0,0.5)" stroke-width="4">DIETETICS</text>
  <text x="22" y="222" font-family="Arial, sans-serif" font-size="14" fill="#4ade80" letter-spacing="3" font-weight="700">DIPLOMA PROGRAM</text>
  
    <rect x="20" y="248" width="118" height="22" rx="3" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="30" y="262.5" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" letter-spacing="2" font-weight="700">SCIENCE-BACKED</text>

