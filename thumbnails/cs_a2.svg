    <line x1="80" y1="0" x2="380" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
    <line x1="260" y1="0" x2="560" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
    <line x1="440" y1="0" x2="740" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
    <line x1="620" y1="0" x2="920" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
    <line x1="800" y1="0" x2="1100" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
    <line x1="980" y1="0" x2="1280" y2="340" stroke="#16a34a" stroke-width="38" stroke-opacity="0.09"/>
