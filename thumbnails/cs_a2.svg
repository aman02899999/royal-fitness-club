    <circle cx="580" cy="-30" r="130" fill="#4ade80" fill-opacity="0.08"/>
    <circle cx="620" cy="30" r="70" fill="#4ade80" fill-opacity="0.06"/>
    <circle cx="-20" cy="310" r="90" fill="#4ade80" fill-opacity="0.07"/>

  <!-- Large emoji background -->
  
    <text x="820" y="240" font-size="140" text-anchor="middle" dominant-baseline="middle" opacity="0.28">🧬</text>
    <text x="810" y="230" font-size="120" text-anchor="middle" dominant-baseline="middle" opacity="0.55">🧬</text>

