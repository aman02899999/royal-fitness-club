    <text x="153" y="316" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" letter-spacing="1"> WEEKS</text>
    <!-- divider -->
    <rect x="250" y="302" width="1" height="28" fill="rgba(255,255,255,0.15)"/>
    <!-- rating stars -->
    <text x="263" y="318" font-family="Arial, sans-serif" font-size="14" fill="#4ade80">★★★★☆</text>
    <text x="340" y="316" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#ffffff">4.8</text>
    <!-- right: USA FITNESS ACADEMY seal -->
    <circle cx="845" cy="318" r="18" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="845" y="314" font-family="Arial Black, Arial" font-weight="900" font-size="6.5" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">USA</text>
    <text x="845" y="323" font-family="Arial Black, Arial" font-weight="900" font-size="6.5" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">FITNESS</text>
    <text x="845" y="331" font-family="Arial Black, Arial" font-weight="900" font-size="6.5" fill="#4ade80" text-anchor="middle" letter-spacing="0.5">ACADEMY</text>

  <!-- Side accent line -->
  <rect x="0" y="48" width="4" height="247" fill="#4ade80" fill-opacity="0.8" rx="2"/>
