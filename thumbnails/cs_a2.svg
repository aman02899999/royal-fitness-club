    <rect x="20" y="60" width="92" height="24" rx="12" fill="rgba(74,222,128,.18)" stroke="#4ade80" stroke-width="1.2"/>
    <text x="66" y="76" font-family="Arial Black, Arial" font-weight="900" font-size="9.5" fill="#4ade80" letter-spacing="2" text-anchor="middle">ADVANCED</text>

