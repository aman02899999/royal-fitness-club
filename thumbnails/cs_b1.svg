<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <title>FITNESS FOUNDATIONS | USA Fitness Academy CERTIFICATE PROGRAM</title>
  <desc>fitness foundations, certificate program, build your base, 8 modules, 4 WEEKS, rated 4.9/5, USA Fitness Academy certification</desc>
  <defs>
    <linearGradient id="bgcs_b1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="shinecs_b1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgcs_b1)"/>

  <!-- Subtle top shine -->
  <rect width="900" height="160" fill="url(#shinecs_b1)"/>

  <!-- Right accent circle (large faded emoji bg) -->
  <circle cx="760" cy="160" r="155" fill="#22c55e" opacity="0.08"/>
  <circle cx="760" cy="160" r="100" fill="#22c55e" opacity="0.06"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="340" fill="#22c55e"/>

  <!-- Top bar: academy name -->
  <rect x="0" y="0" width="900" height="52" fill="rgba(0,0,0,0.35)"/>
  <!-- Flag color bars -->
  <rect x="6" y="0" width="4" height="52" fill="#B22234"/>
  <rect x="10" y="0" width="4" height="52" fill="#FFFFFF" opacity="0.9"/>
  <rect x="14" y="0" width="4" height="52" fill="#3C3B6E"/>
  <text x="26" y="33" font-family="'Arial Black',Impact,sans-serif" font-size="14" font-weight="900" fill="#fff" letter-spacing="3">USA FITNESS ACADEMY</text>
  <text x="26" y="46" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="2">WORLD-CLASS CERTIFICATION PROGRAMS</text>

  <!-- ACCREDITED badge -->
  <rect x="800" y="10" width="90" height="22" rx="3" fill="#22c55e" opacity="0.25"/>
  <rect x="800" y="10" width="90" height="22" rx="3" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
  <text x="845" y="25" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="1.5">ACCREDITED</text>

  <!-- Level badge -->
  <rect x="40" y="64" width="92" height="22" rx="11" fill="#16a34a"/>
  <text x="86" y="79" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">BEGINNER</text>

  <!-- Course title (big) -->
  <text x="40" y="152" font-family="Impact,'Arial Black',sans-serif" font-size="64" font-weight="900" fill="#fff" letter-spacing="1">FITNESS</text>
  <text x="40" y="222" font-family="Impact,'Arial Black',sans-serif" font-size="64" font-weight="900" fill="#fff" letter-spacing="1">FOUNDATIONS</text>

  <!-- Sub/type line -->
  <text x="40" y="300" font-family="Arial,sans-serif" font-size="13" fill="#22c55e" letter-spacing="3" opacity="0.9">CERTIFICATE PROGRAM</text>

  <!-- Tag line -->
  <rect x="40" y="314" width="128.5" height="20" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="104.25" y="328" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1.5">BUILD YOUR BASE</text>

  <!-- Emoji right side -->
  <text x="750" y="210" font-size="110" text-anchor="middle" opacity="0.7">💪</text>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="900" height="50" fill="rgba(0,0,0,0.45)"/>
  <rect x="0" y="290" width="900" height="1" fill="#22c55e" opacity="0.4"/>

  <!-- Stats -->
  <text x="40" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#22c55e">8</text>
  <text x="52" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> MODULES</text>

  <text x="180" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#22c55e">4 WEEKS</text>

  <text x="310" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">★★★★</text>
  <text x="358" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> 4.9</text>

  <!-- Price pill -->
  <rect x="610" y="300" width="110" height="28" rx="14" fill="#22c55e" opacity="0.18"/>
  <rect x="610" y="300" width="110" height="28" rx="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  <text x="665" y="319" font-family="'Arial Black',Impact,sans-serif" font-size="13" font-weight="900" fill="#22c55e" text-anchor="middle">₹2,999</text>

  <!-- USA Fitness Academy seal circle -->
  <circle cx="845" cy="315" r="22" fill="#22c55e" opacity="0.12"/>
  <circle cx="845" cy="315" r="22" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <text x="845" y="310" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="0.5">USA FITNESS</text>
  <text x="845" y="320" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="0.5">ACADEMY</text>
  <text x="845" y="330" font-family="Arial,sans-serif" font-size="7" fill="#22c55e" text-anchor="middle">✦</text>
</svg>