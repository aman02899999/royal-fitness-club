<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <title>ELITE PERFORMANCE MASTER | USA Fitness Academy MASTER CERTIFICATION</title>
  <desc>elite performance master, master certification, elite level mastery, 14 modules, 16 WEEKS, rated 4.9/5, USA Fitness Academy certification</desc>
  <defs>
    <linearGradient id="bgcs_m1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0a04"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="shinecs_m1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgcs_m1)"/>

  <!-- Subtle top shine -->
  <rect width="900" height="160" fill="url(#shinecs_m1)"/>

  <!-- Right accent circle (large faded emoji bg) -->
  <circle cx="760" cy="160" r="155" fill="#fbbf24" opacity="0.08"/>
  <circle cx="760" cy="160" r="100" fill="#fbbf24" opacity="0.06"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="340" fill="#fbbf24"/>

  <!-- Top bar: academy name -->
  <rect x="0" y="0" width="900" height="52" fill="rgba(0,0,0,0.35)"/>
  <!-- Flag color bars -->
  <rect x="6" y="0" width="4" height="52" fill="#B22234"/>
  <rect x="10" y="0" width="4" height="52" fill="#FFFFFF" opacity="0.9"/>
  <rect x="14" y="0" width="4" height="52" fill="#3C3B6E"/>
  <text x="26" y="33" font-family="'Arial Black',Impact,sans-serif" font-size="14" font-weight="900" fill="#fff" letter-spacing="3">USA FITNESS ACADEMY</text>
  <text x="26" y="46" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="2">WORLD-CLASS CERTIFICATION PROGRAMS</text>

  <!-- ACCREDITED badge -->
  <rect x="800" y="10" width="90" height="22" rx="3" fill="#fbbf24" opacity="0.25"/>
  <rect x="800" y="10" width="90" height="22" rx="3" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
  <text x="845" y="25" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="1.5">ACCREDITED</text>

  <!-- Level badge -->
  <rect x="40" y="64" width="74" height="22" rx="11" fill="#92400e"/>
  <text x="77" y="79" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">MASTER</text>

  <!-- Course title (big) -->
  <text x="40" y="152" font-family="Impact,'Arial Black',sans-serif" font-size="64" font-weight="900" fill="#fff" letter-spacing="1">ELITE PERFORMANCE</text>
  <text x="40" y="222" font-family="Impact,'Arial Black',sans-serif" font-size="64" font-weight="900" fill="#fff" letter-spacing="1">MASTER</text>

  <!-- Sub/type line -->
  <text x="40" y="300" font-family="Arial,sans-serif" font-size="13" fill="#fbbf24" letter-spacing="3" opacity="0.9">MASTER CERTIFICATION</text>

  <!-- Tag line -->
  <rect x="40" y="314" width="158.5" height="20" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="119.25" y="328" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1.5">ELITE LEVEL MASTERY</text>

  <!-- Emoji right side -->
  <text x="750" y="210" font-size="110" text-anchor="middle" opacity="0.7">👑</text>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="900" height="50" fill="rgba(0,0,0,0.45)"/>
  <rect x="0" y="290" width="900" height="1" fill="#fbbf24" opacity="0.4"/>

  <!-- Stats -->
  <text x="40" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">14</text>
  <text x="60" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> MODULES</text>

  <text x="180" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">16 WEEKS</text>

  <text x="310" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">★★★★</text>
  <text x="358" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> 4.9</text>

  <!-- Price pill -->
  <rect x="610" y="300" width="110" height="28" rx="14" fill="#fbbf24" opacity="0.18"/>
  <rect x="610" y="300" width="110" height="28" rx="14" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <text x="665" y="319" font-family="'Arial Black',Impact,sans-serif" font-size="13" font-weight="900" fill="#fbbf24" text-anchor="middle">₹9,999</text>

  <!-- USA Fitness Academy seal circle -->
  <circle cx="845" cy="315" r="22" fill="#fbbf24" opacity="0.12"/>
  <circle cx="845" cy="315" r="22" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <text x="845" y="310" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">USA FITNESS</text>
  <text x="845" y="320" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">ACADEMY</text>
  <text x="845" y="330" font-family="Arial,sans-serif" font-size="7" fill="#fbbf24" text-anchor="middle">✦</text>
</svg>