  <text x="40" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">16</text>
  <text x="60" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> MODULES</text>

  <text x="180" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa">14 WEEKS</text>

  <text x="310" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fbbf24">★★★★</text>
  <text x="358" y="322" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)"> 4.9</text>

  <!-- Price pill -->
  <rect x="610" y="300" width="110" height="28" rx="14" fill="#a78bfa" opacity="0.18"/>
  <rect x="610" y="300" width="110" height="28" rx="14" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <text x="665" y="319" font-family="'Arial Black',Impact,sans-serif" font-size="13" font-weight="900" fill="#a78bfa" text-anchor="middle">₹9,999</text>

  <!-- USA Fitness Academy seal circle -->
  <circle cx="845" cy="315" r="22" fill="#a78bfa" opacity="0.12"/>
  <circle cx="845" cy="315" r="22" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <text x="845" y="310" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">USA FITNESS</text>
  <text x="845" y="320" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">ACADEMY</text>
  <text x="845" y="330" font-family="Arial,sans-serif" font-size="7" fill="#a78bfa" text-anchor="middle">✦</text>
