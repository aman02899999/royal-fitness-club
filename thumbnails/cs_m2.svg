  <rect x="800" y="10" width="90" height="22" rx="3" fill="#a78bfa" opacity="0.25"/>
  <rect x="800" y="10" width="90" height="22" rx="3" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <text x="845" y="25" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="1.5">ACCREDITED</text>

