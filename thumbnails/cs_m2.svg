  <text x="77" y="79" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="2">MASTER</text>

  <!-- Course title (big) -->
  <text x="40" y="136" font-family="Impact,'Arial Black',sans-serif" font-size="52" font-weight="900" fill="#fff" letter-spacing="1">PHARMACEUTICAL</text>
  <text x="40" y="194" font-family="Impact,'Arial Black',sans-serif" font-size="52" font-weight="900" fill="#fff" letter-spacing="1">PERFORMANCE</text>
  <text x="40" y="252" font-family="Impact,'Arial Black',sans-serif" font-size="52" font-weight="900" fill="#fff" letter-spacing="1">SCIENCE</text>

