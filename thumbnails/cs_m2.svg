<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <title>PHARMACEUTICAL PERFORMANCE SCIENCE | USA Fitness Academy MASTER PROGRAM (18+)</title>
  <desc>pharmaceutical performance science, master program (18+), advanced pharmacology, 16 modules, 14 WEEKS, rated 4.9/5, USA Fitness Academy certification</desc>
  <defs>
    <linearGradient id="bgcs_m2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0b35"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="shinecs_m2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgcs_m2)"/>

  <!-- Subtle top shine -->
  <rect width="900" height="160" fill="url(#shinecs_m2)"/>

  <!-- Right accent circle (large faded emoji bg) -->
  <circle cx="760" cy="160" r="155" fill="#a78bfa" opacity="0.08"/>
  <circle cx="760" cy="160" r="100" fill="#a78bfa" opacity="0.06"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="6" height="340" fill="#a78bfa"/>

  <!-- Top bar: academy name -->
  <rect x="0" y="0" width="900" height="52" fill="rgba(0,0,0,0.35)"/>
  <!-- Flag color bars -->
  <rect x="6" y="0" width="4" height="52" fill="#B22234"/>
  <rect x="10" y="0" width="4" height="52" fill="#FFFFFF" opacity="0.9"/>
  <rect x="14" y="0" width="4" height="52" fill="#3C3B6E"/>
  <text x="26" y="33" font-family="'Arial Black',Impact,sans-serif" font-size="14" font-weight="900" fill="#fff" letter-spacing="3">USA FITNESS ACADEMY</text>
  <text x="26" y="46" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.55)" letter-spacing="2">WORLD-CLASS CERTIFICATION PROGRAMS</text>

